# Development override — runs only data stores.
# Backend and frontend run via `pnpm dev` on the host.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novadash
      POSTGRES_PASSWORD: novadash
      POSTGRES_DB: novadash
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novadash"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
