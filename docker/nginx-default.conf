# ╔══════════════════════════════════════════════════════════════════════╗
# ║  NovaPanel — Nginx Default Server Block                             ║
# ║                                                                     ║
# ║  This is the fallback server block used when no other server_name   ║
# ║  matches. It proxies to the panel API and serves as a catch-all.    ║
# ║                                                                     ║
# ║  Architecture:                                                      ║
# ║    Client → Nginx (80/443) → Panel API (8732)                      ║
# ║                          → Apache (8080) for .htaccess sites         ║
# ║                                                                     ║
# ║  NOTE: The panel API is directly accessible on port 8732 as a        ║
# ║  FALLBACK if Nginx is unavailable. This ensures admin access even   ║
# ║  when Nginx configuration is broken.                                ║
# ╚══════════════════════════════════════════════════════════════════════╝

# Upstream: NovaPanel API
upstream panel_api {
    server 127.0.0.1:8732;
    keepalive 64;
}

# Upstream: Apache backend (for .htaccess support)
upstream apache_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Default server — catch-all
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;
    index index.html index.php;

    # ─── Panel API Proxy ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://panel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── WebSocket Proxy ────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://panel_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ─── Panel Frontend ─────────────────────────────────────────────
    location / {
        proxy_pass http://panel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Static files (direct serve for performance) ────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://panel_api;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── PHP files (fallback to PHP-FPM) ────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300s;
    }

    # ─── Deny hidden files ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
